server {
    listen 80;
    listen [::]:80;
    server_name delogischepartij.nl www.delogischepartij.nl delogischepartij.eu www.delogischepartij.eu;
    return 301 https://delogischepartij.nl$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.delogischepartij.nl delogischepartij.eu www.delogischepartij.eu;

    ssl_certificate /etc/letsencrypt/live/delogischepartij.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/delogischepartij.nl/privkey.pem;

    return 301 https://delogischepartij.nl$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name delogischepartij.nl;

    ssl_certificate /etc/letsencrypt/live/delogischepartij.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/delogischepartij.nl/privkey.pem;

    root /var/www/delogischepartij.nl/public;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
